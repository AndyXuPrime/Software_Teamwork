name: Auth Gateway Redis Smoke

on:
  workflow_dispatch:
    inputs:
      use_registry_rewrite:
        description: Use deploy/.env.example infrastructure image registry rewrite
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache-dependency-path: |
            services/deploy/smoke/go.mod
            services/auth/go.mod
            services/gateway/go.mod

      - name: Prepare smoke env
        shell: bash
        run: |
          cp deploy/.env.example /tmp/auth-gateway-redis-smoke.env
          if [ "${{ inputs.use_registry_rewrite }}" != "true" ]; then
            sed -i '/^[A-Z0-9_]*_IMAGE=/d' /tmp/auth-gateway-redis-smoke.env
          fi

      - name: Run Auth/Gateway/Redis smoke
        env:
          AUTH_GATEWAY_REDIS_ENV_FILE: /tmp/auth-gateway-redis-smoke.env
          AUTH_GATEWAY_REDIS_INFRA_WAIT_TIMEOUT_SECONDS: "180"
        run: bash scripts/run_issue_352_smoke.sh
